<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>星际之旅 · 宇宙探索与人类梦想</title>
<style>
/* ============ 全局基础 ============ */
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%; height: 100%;
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #05060f; color: #fff; overflow: hidden;
  user-select: none;
}
/* 手机外框（适配 375x667 竖屏） */
#phone {
  position: relative;
  width: 375px; height: 667px;
  margin: 0 auto;
  background: radial-gradient(ellipse at 50% 30%, #1a1040 0%, #0a0e27 55%, #05060f 100%);
  overflow: hidden;
  box-shadow: 0 0 60px rgba(80,60,180,.4);
}
@media (max-width: 420px) {
  #phone { width: 100vw; height: 100vh; box-shadow: none; }
}

/* ============ 星空背景层 ============ */
#starfield { position: absolute; inset: 0; z-index: 0; pointer-events: none; }
.star {
  position: absolute; background: #fff; border-radius: 50%;
  animation: twinkle 3s infinite ease-in-out;
}
@keyframes twinkle { 0%,100%{opacity:.25;} 50%{opacity:1;} }
/* 流星 */
.meteor {
  position: absolute; width: 2px; height: 2px; background: #fff; border-radius: 50%;
  box-shadow: 0 0 6px 2px rgba(255,255,255,.7);
}
.meteor::after {
  content:''; position:absolute; top:0; left:0; width:90px; height:1px;
  background: linear-gradient(90deg, rgba(255,255,255,.8), transparent);
  transform: translateX(-90px) rotate(0deg); transform-origin: right;
}
@keyframes meteorFly {
  0% { transform: translate(0,0); opacity:0; }
  10%{ opacity:1; }
  100%{ transform: translate(420px,300px); opacity:0; }
}
/* 星云 */
.nebula {
  position:absolute; border-radius:50%; filter: blur(40px); opacity:.35; pointer-events:none;
}
.nebula.n1{ width:260px;height:260px; background:#7b2ff7; top:-60px; left:-70px; }
.nebula.n2{ width:240px;height:240px; background:#1f6feb; bottom:-50px; right:-60px; }

/* ============ 页面切换 ============ */
.page {
  position: absolute; inset: 0; z-index: 2;
  display: flex; flex-direction: column; align-items: center;
  padding: 40px 22px 90px;
  opacity: 0; visibility: hidden; transform: translateY(30px) scale(.98);
  transition: opacity .6s ease, transform .6s ease, visibility .6s;
}
.page.active { opacity: 1; visibility: visible; transform: none; }

/* 标题通用 */
.title {
  font-size: 30px; font-weight: 800; letter-spacing: 4px;
  background: linear-gradient(90deg,#4fc3f7,#9d4edd,#fff);
  -webkit-background-clip: text; background-clip:text; color: transparent;
  text-shadow: 0 0 18px rgba(157,78,221,.4);
  text-align:center;
}
.subtitle { font-size: 14px; color: #b8c4ff; margin-top: 12px; letter-spacing: 2px; text-align:center; }
.section-title { font-size: 22px; font-weight: 700; letter-spacing: 2px; margin-bottom: 4px; color:#eaf2ff; }
.section-tip { font-size: 12px; color:#8893c9; margin-bottom: 16px; }

/* 通用按钮 */
.btn {
  position: relative; cursor: pointer; border: none; outline: none;
  padding: 14px 38px; border-radius: 40px; font-size: 16px; font-weight: 700; letter-spacing: 2px;
  color: #fff;
  background: linear-gradient(135deg,#4fc3f7,#9d4edd);
  box-shadow: 0 8px 24px rgba(79,195,247,.35);
  transition: transform .2s ease, box-shadow .2s ease, filter .2s;
}
.btn:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 12px 30px rgba(157,78,221,.55); }
.btn:active { transform: scale(.95); filter: brightness(.9); }
.btn.ghost { background: transparent; border: 1.5px solid #4fc3f7; box-shadow: none; }
.btn.ghost:hover { background: rgba(79,195,247,.12); }
.btn.sm { padding: 9px 20px; font-size: 13px; }

/* 底部导航点 */
#dots { position: absolute; bottom: 18px; left:0; right:0; z-index: 30; display:flex; justify-content:center; gap:8px; }
#dots span { width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.25); transition:.3s; cursor:pointer;}
#dots span.on { background:#4fc3f7; width:22px; border-radius:5px; }

/* 顶部工具栏（音乐开关） */
#topbar { position:absolute; top:14px; right:14px; z-index:40; display:flex; gap:10px; }
.icon-btn {
  width:38px;height:38px;border-radius:50%; cursor:pointer; border:1px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.06); color:#fff; font-size:16px; display:flex; align-items:center; justify-content:center;
  transition:.2s; backdrop-filter: blur(4px);
}
.icon-btn:hover { background:rgba(79,195,247,.25); transform: scale(1.08); }

/* ============ 1. 封面页 ============ */
#p0 { justify-content: center; }
.earth {
  width: 150px; height: 150px; border-radius: 50%; margin: 26px 0 36px; position: relative;
  background: radial-gradient(circle at 32% 30%, #6fd0ff 0%, #2a7fd6 35%, #14407a 70%, #0a2347 100%);
  box-shadow: inset -22px -16px 50px rgba(0,0,0,.65), 0 0 50px rgba(79,150,255,.55);
  animation: spinEarth 22s linear infinite;
  overflow:hidden;
}
.earth::before {
  content:''; position:absolute; inset:0; border-radius:50%;
  background:
    radial-gradient(circle at 60% 40%, rgba(46,170,90,.85) 0 12%, transparent 13%),
    radial-gradient(circle at 30% 65%, rgba(46,170,90,.8) 0 10%, transparent 11%),
    radial-gradient(circle at 75% 70%, rgba(46,170,90,.75) 0 9%, transparent 10%),
    radial-gradient(circle at 45% 25%, rgba(46,170,90,.7) 0 7%, transparent 8%);
  mix-blend-mode: screen; opacity:.9;
}
.earth::after {
  content:''; position:absolute; inset:-6px; border-radius:50%;
  box-shadow: inset 0 0 22px rgba(140,210,255,.6);
}
@keyframes spinEarth { from{ background-position:0 0;} to{ background-position:300px 0;} }
.float-hint { margin-top: 26px; font-size:12px; color:#7d8ad0; animation: floaty 2s ease-in-out infinite; }
@keyframes floaty { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);} }

/* ============ 2. 太阳系页 ============ */
#solar { position: relative; width: 330px; height: 330px; margin-top: 8px; }
.sun {
  position:absolute; top:50%; left:50%; width:54px; height:54px; transform: translate(-50%,-50%);
  border-radius:50%; background: radial-gradient(circle,#fff6c0,#ffb627 60%,#ff7a00);
  box-shadow: 0 0 30px 10px rgba(255,150,0,.7); z-index:5; cursor:pointer;
  animation: sunPulse 3s ease-in-out infinite;
}
@keyframes sunPulse { 0%,100%{box-shadow:0 0 30px 8px rgba(255,150,0,.7);} 50%{box-shadow:0 0 40px 16px rgba(255,180,0,.9);} }
.orbit {
  position:absolute; top:50%; left:50%; transform: translate(-50%,-50%);
  border:1px solid rgba(255,255,255,.10); border-radius:50%;
}
.planet-track {
  position:absolute; top:50%; left:50%; transform: translate(-50%,-50%);
  border-radius:50%; transform-origin:center;
}
.planet-track .planet {
  position:absolute; top:0; left:50%; transform: translate(-50%,-50%);
  border-radius:50%; cursor:pointer; transition: filter .2s;
}
.planet:hover { filter: brightness(1.4) drop-shadow(0 0 8px #fff); }
@keyframes orbitSpin { from{transform:translate(-50%,-50%) rotate(0);} to{transform:translate(-50%,-50%) rotate(360deg);} }

/* 行星介绍弹窗 */
#planetModal {
  position:absolute; inset:0; z-index:60; display:none; align-items:center; justify-content:center;
  background: rgba(5,6,15,.7); backdrop-filter: blur(4px);
}
#planetModal.show { display:flex; }
.modal-card {
  width: 280px; padding: 24px 22px; border-radius: 18px; text-align:center;
  background: linear-gradient(160deg, rgba(40,30,90,.95), rgba(15,18,45,.95));
  border:1px solid rgba(157,78,221,.5); box-shadow: 0 0 40px rgba(120,80,220,.5);
  animation: pop .35s cubic-bezier(.2,1.4,.4,1);
}
@keyframes pop { 0%{transform:scale(.7);opacity:0;} 100%{transform:scale(1);opacity:1;} }
.modal-card .pico { width:64px;height:64px;border-radius:50%;margin:0 auto 12px; box-shadow:0 0 20px rgba(255,255,255,.2);}
.modal-card h3 { font-size:20px; letter-spacing:2px; color:#fff; }
.modal-card .tag { display:inline-block; margin:8px 0 12px; font-size:11px; padding:3px 12px; border-radius:20px; background:rgba(79,195,247,.2); color:#8fd6ff; }
.modal-card p { font-size:13px; line-height:1.7; color:#cdd6ff; }

/* ============ 3. 时间轴页 ============ */
#timeWrap {
  width: 100%; flex:1; overflow-x:auto; overflow-y:hidden; -webkit-overflow-scrolling:touch;
  padding: 10px 0 20px;
}
#timeline { display:flex; gap:0; padding: 0 30px; height: 100%; align-items:center; position:relative; }
#timeline::before {
  content:''; position:absolute; left:0; right:0; top:50%; height:2px;
  background: linear-gradient(90deg,#4fc3f7,#9d4edd); opacity:.5;
}
.tl-node {
  position:relative; min-width: 220px; margin: 0 14px;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px;
}
.tl-dot {
  width:16px;height:16px;border-radius:50%; background:#4fc3f7; box-shadow:0 0 12px #4fc3f7; z-index:2;
}
.tl-card {
  width: 210px; padding: 14px; border-radius:14px; text-align:center;
  background: linear-gradient(160deg, rgba(40,30,90,.9), rgba(15,18,45,.9));
  border:1px solid rgba(120,90,220,.4); animation: rise .6s ease both;
}
.tl-year { font-size:22px; font-weight:800; color:#9d4edd; }
.tl-icon { font-size:34px; margin:6px 0; }
.tl-name { font-size:15px; font-weight:700; color:#fff; }
.tl-desc { font-size:12px; color:#b9c2ee; line-height:1.6; margin-top:6px; }
@keyframes rise { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:none;} }
.swipe-hint { font-size:11px; color:#7d8ad0; }

/* ============ 4. 火箭发射页 ============ */
#launchStage {
  position:relative; width:100%; flex:1; display:flex; align-items:flex-end; justify-content:center; overflow:hidden;
}
.ground {
  position:absolute; bottom:0; left:0; right:0; height:60px;
  background: linear-gradient(180deg, transparent, #1a1f40);
}
.rocket {
  position:absolute; bottom:60px; left:50%; transform: translateX(-50%);
  width:48px; height:120px; z-index:5; transition: none;
}
.rocket.launch { animation: launchUp 4s ease-in forwards; }
@keyframes launchUp {
  0%{ transform: translate(-50%,0); }
  20%{ transform: translate(-50%,-30px); }
  100%{ transform: translate(-50%,-760px); }
}
.flame {
  position:absolute; bottom:54px; left:50%; transform:translateX(-50%);
  width:24px; height:0; z-index:4;
  background: radial-gradient(circle at 50% 0,#fff 0%,#ffd000 30%,#ff7a00 60%,#ff2d00 100%);
  border-radius:0 0 50% 50%; filter: blur(1px); opacity:0;
}
.flame.on { animation: flameBurn .15s infinite alternate; }
@keyframes flameBurn { from{height:46px;opacity:1;} to{height:70px;opacity:.85;} }
.smoke {
  position:absolute; bottom:50px; border-radius:50%; background: rgba(220,220,230,.5);
  filter: blur(6px); pointer-events:none;
}
@keyframes smokePuff {
  0%{ transform: translate(0,0) scale(.4); opacity:.7; }
  100%{ transform: translate(var(--sx),60px) scale(2.4); opacity:0; }
}
#countdown {
  position:absolute; top:38%; left:50%; transform:translate(-50%,-50%);
  font-size:90px; font-weight:900; color:#fff; text-shadow:0 0 30px #4fc3f7; opacity:0;
}
#countdown.show { animation: cd 1s ease; }
@keyframes cd { 0%{opacity:0;transform:translate(-50%,-50%) scale(2);} 30%{opacity:1;transform:translate(-50%,-50%) scale(1);} 100%{opacity:0;transform:translate(-50%,-50%) scale(.6);} }
#launchSuccess {
  position:absolute; top:30%; left:0; right:0; text-align:center; opacity:0; z-index:8;
  font-size:20px; font-weight:800; letter-spacing:2px;
  background: linear-gradient(90deg,#4fc3f7,#9d4edd); -webkit-background-clip:text; background-clip:text; color:transparent;
}
#launchSuccess.show { animation: rise .8s ease forwards; }

/* ============ 5. 问答页 ============ */
#quizBox { width:100%; margin-top: 10px; }
.q-progress { font-size:12px; color:#8893c9; margin-bottom:10px; text-align:center; }
.q-text { font-size:17px; font-weight:700; line-height:1.6; margin-bottom:18px; min-height:50px; }
.options { display:flex; flex-direction:column; gap:12px; }
.opt {
  padding:14px 16px; border-radius:12px; cursor:pointer; font-size:14px;
  background: rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.15);
  transition: .2s;
}
.opt:hover { background: rgba(79,195,247,.15); border-color:#4fc3f7; transform: translateX(4px); }
.opt.correct { background: rgba(46,204,113,.25); border-color:#2ecc71; }
.opt.wrong { background: rgba(231,76,60,.25); border-color:#e74c3c; }
.opt.disabled { pointer-events:none; }
.q-feedback { text-align:center; margin-top:16px; font-size:14px; font-weight:600; min-height:22px; }
#quizResult { text-align:center; }
#quizResult .score { font-size:54px; font-weight:900; color:#4fc3f7; text-shadow:0 0 20px rgba(79,195,247,.6); }
#quizResult .encourage { font-size:15px; color:#cdd6ff; margin:14px 0 24px; line-height:1.7; }

/* ============ 6. 结尾页 ============ */
#p5 { justify-content: center; }
.astronaut { position:relative; width:130px; height:170px; margin: 6px 0 20px; }
.helmet {
  position:absolute; top:0; left:50%; transform:translateX(-50%);
  width:90px; height:90px; border-radius:50%;
  background: radial-gradient(circle at 35% 30%, #eef4ff, #b8c6e8 60%, #7e8cc0);
  box-shadow: 0 0 24px rgba(150,180,255,.5);
  display:flex; align-items:center; justify-content:center; overflow:hidden;
}
.visor {
  width:62px; height:62px; border-radius:50%; overflow:hidden;
  background: radial-gradient(circle at 35% 30%, #2a3a6e, #0a1330 70%);
  display:flex; align-items:center; justify-content:center;
  border:3px solid #2a3357;
}
.visor img { width:100%; height:100%; object-fit:cover; }
.visor .glint { position:absolute; width:18px;height:30px;border-radius:50%;background:rgba(255,255,255,.25); transform:rotate(25deg); top:6px; left:14px;}
.body {
  position:absolute; bottom:0; left:50%; transform:translateX(-50%);
  width:80px; height:95px; border-radius:30px 30px 22px 22px;
  background: linear-gradient(180deg,#eef2fb,#c4cde6);
  box-shadow: inset 0 -8px 16px rgba(120,130,170,.5);
}
.body::before { content:''; position:absolute; top:26px; left:50%; transform:translateX(-50%); width:30px;height:30px;border-radius:8px; background:linear-gradient(135deg,#4fc3f7,#9d4edd); box-shadow:0 0 10px rgba(79,195,247,.6);}
.end-text { font-size:24px; font-weight:800; letter-spacing:3px; text-align:center;
  background:linear-gradient(90deg,#4fc3f7,#9d4edd,#fff); -webkit-background-clip:text; background-clip:text; color:transparent; }
.end-sub { font-size:13px; color:#b8c4ff; margin:14px 0 26px; text-align:center; line-height:1.7; }
.end-btns { display:flex; flex-direction:column; gap:12px; align-items:center; }
.upload-row { display:flex; gap:10px; margin-top:8px; }
#avatarInput { display:none; }

/* 弹出 Toast */
#toast {
  position:absolute; bottom:60px; left:50%; transform:translateX(-50%) translateY(20px);
  background:rgba(20,24,50,.95); border:1px solid #4fc3f7; color:#fff;
  padding:10px 22px; border-radius:30px; font-size:13px; opacity:0; z-index:80; transition:.3s;
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* 纪念卡片 canvas 弹层 */
#cardLayer {
  position:absolute; inset:0; z-index:90; display:none; flex-direction:column; align-items:center; justify-content:center;
  background:rgba(5,6,15,.85); backdrop-filter: blur(6px); gap:16px;
}
#cardLayer.show{ display:flex; }
#cardCanvas { width:260px; border-radius:14px; box-shadow:0 0 40px rgba(120,80,220,.6); }
</style>
</head>
<body>
<div id="phone">
  <!-- 背景层 -->
  <div class="nebula n1"></div>
  <div class="nebula n2"></div>
  <div id="starfield"></div>

  <!-- 顶部工具 -->
  <div id="topbar">
    <div class="icon-btn" id="musicBtn" title="背景音乐">♪</div>
  </div>

  <!-- ========== 1 封面 ========== -->
  <section class="page active" id="p0">
    <h1 class="title">星际之旅</h1>
    <p class="subtitle">从地球出发，探索浩瀚宇宙</p>
    <div class="earth"></div>
    <button class="btn" onclick="go(1)">开始探索 🚀</button>
    <div class="float-hint">▼ 仰望星空，勇敢探索未知 ▼</div>
  </section>

  <!-- ========== 2 太阳系 ========== -->
  <section class="page" id="p1">
    <h2 class="section-title">太阳系探索</h2>
    <p class="section-tip">点击任意星球，了解它的故事</p>
    <div id="solar">
      <div class="sun" onclick="showPlanet('sun')"></div>
    </div>
    <button class="btn sm ghost" onclick="go(2)">进入时间轴 →</button>
  </section>

  <!-- ========== 3 时间轴 ========== -->
  <section class="page" id="p2">
    <h2 class="section-title">航天发展时间轴</h2>
    <p class="section-tip">人类仰望星空的每一步</p>
    <div id="timeWrap"><div id="timeline"></div></div>
    <p class="swipe-hint">← 左右滑动查看更多 →</p>
    <button class="btn sm" onclick="go(3)">去发射火箭 →</button>
  </section>

  <!-- ========== 4 火箭发射 ========== -->
  <section class="page" id="p3">
    <h2 class="section-title">太空任务</h2>
    <p class="section-tip">准备好了吗？点火，升空！</p>
    <div id="launchStage">
      <div class="ground"></div>
      <div class="smoke-host"></div>
      <div class="flame" id="flame"></div>
      <!-- 火箭 SVG -->
      <svg class="rocket" id="rocket" viewBox="0 0 48 120">
        <path d="M24 0 C36 18 40 50 40 80 L8 80 C8 50 12 18 24 0Z" fill="#eef2fb"/>
        <path d="M24 0 C30 18 32 40 32 80 L24 80Z" fill="#cfd8ee"/>
        <circle cx="24" cy="40" r="9" fill="#1a2750" stroke="#4fc3f7" stroke-width="2"/>
        <circle cx="24" cy="40" r="4" fill="#8fd6ff"/>
        <path d="M8 78 L0 100 L8 92Z" fill="#9d4edd"/>
        <path d="M40 78 L48 100 L40 92Z" fill="#9d4edd"/>
        <rect x="14" y="80" width="20" height="14" rx="3" fill="#4fc3f7"/>
      </svg>
      <div id="countdown"></div>
      <div id="launchSuccess">探索，从这一刻开始 ✨</div>
    </div>
    <button class="btn" id="launchBtn" onclick="launch()">🔥 发射火箭</button>
    <button class="btn sm ghost" style="margin-top:10px" onclick="go(4)">挑战问答 →</button>
  </section>

  <!-- ========== 5 问答 ========== -->
  <section class="page" id="p4">
    <h2 class="section-title">宇宙知识问答</h2>
    <div id="quizBox"></div>
    <div id="quizResult" style="display:none">
      <div class="score" id="scoreNum">0</div>
      <div class="encourage" id="encourage"></div>
      <button class="btn" onclick="startQuiz()">再答一次</button>
      <button class="btn sm ghost" style="margin-top:10px" onclick="go(5)">完成旅程 →</button>
    </div>
  </section>

  <!-- ========== 6 结尾 ========== -->
  <section class="page" id="p5">
    <div class="astronaut">
      <div class="helmet">
        <div class="visor" id="visor"><div class="glint"></div></div>
      </div>
      <div class="body"></div>
    </div>
    <div class="end-text">宇宙辽阔，探索不止</div>
    <div class="end-sub">每一次仰望，都是梦想的起点<br>愿你永远保持探索的勇气</div>
    <div class="end-btns">
      <div class="upload-row">
        <button class="btn sm" onclick="document.getElementById('avatarInput').click()">📷 上传头像</button>
        <button class="btn sm ghost" onclick="makeCard()">🎴 纪念卡片</button>
      </div>
      <button class="btn" onclick="restart()">↺ 重新开始</button>
    </div>
    <input type="file" id="avatarInput" accept="image/*">
  </section>

  <!-- 行星弹窗 -->
  <div id="planetModal" onclick="closePlanet(event)">
    <div class="modal-card" onclick="event.stopPropagation()">
      <div class="pico" id="pico"></div>
      <h3 id="pname"></h3>
      <span class="tag" id="pdist"></span>
      <p id="pdesc"></p>
      <button class="btn sm" style="margin-top:16px" onclick="closePlanet()">关闭</button>
    </div>
  </div>

  <!-- 纪念卡片层 -->
  <div id="cardLayer">
    <canvas id="cardCanvas" width="520" height="720"></canvas>
    <div style="display:flex;gap:12px">
      <button class="btn sm" onclick="downloadCard()">💾 保存卡片</button>
      <button class="btn sm ghost" onclick="document.getElementById('cardLayer').classList.remove('show')">关闭</button>
    </div>
  </div>

  <div id="toast"></div>
  <div id="dots"></div>
</div>

<script>
/* =================== 数据 =================== */
// 行星数据：颜色用于绘制小圆，size 半径，orbit 轨道半径，speed 公转秒数
const PLANETS = {

/* =================== 太阳系生成 =================== */
const solar = document.getElementById('solar');
Object.keys(PLANETS).forEach(key=>{
  if(key==='sun') return;
  const p = PLANETS[key];
  // 轨道线
  const orbit=document.createElement('div');
  orbit.className='orbit';
  orbit.style.width=orbit.style.height=(p.orbit*2)+'px';
  solar.appendChild(orbit);
  // 公转轨道容器
  const track=document.createElement('div');
  track.className='planet-track';
  track.style.width=track.style.height=(p.orbit*2)+'px';
  track.style.animation=`orbitSpin ${p.speed}s linear infinite`;
  const planet=document.createElement('div');
  planet.className='planet';
  planet.style.width=planet.style.height=(p.size*2)+'px';
  planet.style.background=p.color;
  // 反向旋转保持星球自身朝向（可选，这里保留）
  planet.onclick=(e)=>{ e.stopPropagation(); showPlanet(key); };
  track.appendChild(planet);
  solar.appendChild(track);
});

/* =================== 行星弹窗 =================== */

/* =================== 页面切换 =================== */
let cur=0; const TOTAL=6;
const dots=document.getElementById('dots');
for(let i=0;i<TOTAL;i++){
  const d=document.createElement('span');
  if(i===0) d.className='on';
  d.onclick=()=>go(i);
  dots.appendChild(d);
}
function go(n){
  if(n<0||n>=TOTAL) return;
  document.getElementById('p'+cur).classList.remove('active');
  cur=n;
  document.getElementById('p'+cur).classList.add('active');
  [...dots.children].forEach((d,i)=>d.classList.toggle('on',i===cur));
  blip(520);
  if(cur===4) startQuiz();
}

/* =================== 火箭发射 =================== */
let launching=false;
function launch(){
  if(launching) return;
  launching=true;
  const btn=document.getElementById('launchBtn');
  btn.style.opacity=.4; btn.style.pointerEvents='none';
  const cd=document.getElementById('countdown');
  let n=3;
  const tick=()=>{
    cd.textContent=n;
    cd.classList.remove('show'); void cd.offsetWidth; cd.classList.add('show');
    blip(440+ (3-n)*80);
    n--;
    if(n>=0){ setTimeout(tick,1000); }
    else { setTimeout(fire,300); }
  };
  tick();
}
function fire(){
  const rocket=document.getElementById('rocket');
  const flame=document.getElementById('flame');
  flame.classList.add('on');
  rocketRoar();
  // 烟雾
  const host=document.querySelector('.smoke-host');
  let smokeTimer=setInterval(()=>{
    const s=document.createElement('div');
    s.className='smoke';
    const sz=Math.random()*18+14;
    s.style.width=s.style.height=sz+'px';
    s.style.left=(150+(Math.random()*40-20))+'px';
    s.style.setProperty('--sx',(Math.random()*60-30)+'px');
    s.style.animation='smokePuff 1.4s ease-out forwards';
    host.appendChild(s);
    setTimeout(()=>s.remove(),1400);
  },80);
  setTimeout(()=>{ rocket.classList.add('launch'); },200);
  setTimeout(()=>{
    clearInterval(smokeTimer);
    flame.classList.remove('on');
    document.getElementById('launchSuccess').classList.add('show');
  },2600);
  // 复位
  setTimeout(()=>{
    rocket.classList.remove('launch');
    document.getElementById('launchSuccess').classList.remove('show');
    const btn=document.getElementById('launchBtn');
    btn.style.opacity=1; btn.style.pointerEvents='auto';
    launching=false;
  },6000);
}

/* =================== 问答 =================== */
let qIndex=0, score=0;
function startQuiz(){
  qIndex=0; score=0;
  document.getElementById('quizResult').style.display='none';
  document.getElementById('quizBox').style.display='block';
  renderQ();
}
function renderQ(){
  const q=QUIZ[qIndex];
  const box=document.getElementById('quizBox');
  box.innerHTML=`
    <div class="q-progress">第 ${qIndex+1} / ${QUIZ.length} 题　得分 ${score}</div>
    <div class="q-text">${q.q}</div>
    <div class="options">
      ${q.opts.map((o,i)=>`<div class="opt" onclick="pick(${i})">${String.fromCharCode(65+i)}. ${o}</div>`).join('')}
    </div>
    <div class="q-feedback" id="qfb"></div>`;
}
function pick(i){
  const q=QUIZ[qIndex];
  const opts=document.querySelectorAll('.opt');
  opts.forEach(o=>o.classList.add('disabled'));
  const fb=document.getElementById('qfb');
  if(i===q.a){
    opts[i].classList.add('correct'); score++;
    fb.textContent='✅ 回答正确！'; fb.style.color='#2ecc71';
    blip(880);
  }else{
    opts[i].classList.add('wrong');
    opts[q.a].classList.add('correct');
    fb.textContent='❌ 正确答案是 '+String.fromCharCode(65+q.a); fb.style.color='#e74c3c';
    blip(220);
  }
  setTimeout(()=>{
    qIndex++;
    if(qIndex<QUIZ.length) renderQ();
    else showResult();
  },1100);
}
function showResult(){
  document.getElementById('quizBox').style.display='none';
  const r=document.getElementById('quizResult');
  r.style.display='block';
  document.getElementById('scoreNum').textContent=score+' / '+QUIZ.length;
  let msg;
  if(score===QUIZ.length) msg='满分！你就是未来的星际领航员 🌟';
  else if(score>=QUIZ.length-1) msg='非常棒！宇宙知识难不倒你 🚀';
  else if(score>=2) msg='不错哦！继续探索会更厉害 ✨';
  else msg='没关系，每位科学家都从这里起步 💪';
  document.getElementById('encourage').textContent=msg;
}

/* =================== 纪念卡片 =================== */
function makeCard(){
  const c=document.getElementById('cardCanvas');
  const ctx=c.getContext('2d');
  const W=c.width,H=c.height;
  // 背景渐变
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#1a1040'); g.addColorStop(.6,'#0a0e27'); g.addColorStop(1,'#05060f');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // 星星
  for(let i=0;i<120;i++){
    ctx.globalAlpha=Math.random()*0.8+0.2;
    ctx.fillStyle='#fff';
    ctx.beginPath();
    ctx.arc(Math.random()*W,Math.random()*H,Math.random()*1.8,0,7);
    ctx.fill();
  }
  ctx.globalAlpha=1;
  // 边框
  ctx.strokeStyle='rgba(157,78,221,.6)'; ctx.lineWidth=4;
  ctx.strokeRect(16,16,W-32,H-32);
  // 标题
  ctx.textAlign='center'; ctx.fillStyle='#4fc3f7';
  ctx.font='bold 46px PingFang SC, sans-serif';
  ctx.fillText('星 际 之 旅', W/2, 100);
  ctx.fillStyle='#b8c4ff'; ctx.font='20px sans-serif';
  ctx.fillText('探索证书 · EXPLORER PASS', W/2, 140);

  // 头像圆（头盔效果）
  const cx=W/2, cy=300, r=90;
  ctx.save();
  ctx.beginPath(); ctx.arc(cx,cy,r+10,0,7); ctx.fillStyle='#cdd8f2'; ctx.fill();
  ctx.beginPath(); ctx.arc(cx,cy,r,0,7); ctx.closePath(); ctx.clip();
  if(avatarData){
    const img=new Image();
    img.onload=()=>{
      ctx.drawImage(img,cx-r,cy-r,r*2,r*2);
      ctx.restore();
      finishCard(ctx,W,H,cx,cy,r);
    };
    img.src=avatarData;
    return; // 异步绘制
  }else{
    const ig=ctx.createRadialGradient(cx-20,cy-20,10,cx,cy,r);
    ig.addColorStop(0,'#2a3a6e'); ig.addColorStop(1,'#0a1330');
    ctx.fillStyle=ig; ctx.fillRect(cx-r,cy-r,r*2,r*2);
    ctx.fillStyle='#8fd6ff'; ctx.font='60px sans-serif'; ctx.textAlign='center';
    ctx.fillText('🚀',cx,cy+20);
    ctx.restore();
    finishCard(ctx,W,H,cx,cy,r);
  }
}
function finishCard(ctx,W,H,cx,cy,r){
  ctx.beginPath(); ctx.arc(cx,cy,r,0,7);
  ctx.strokeStyle='#4fc3f7'; ctx.lineWidth=5; ctx.stroke();
  // 文案
  ctx.textAlign='center';
  ctx.fillStyle='#fff'; ctx.font='bold 30px sans-serif';
  ctx.fillText('宇宙辽阔，探索不止', W/2, 470);
  ctx.fillStyle='#9d4edd'; ctx.font='bold 26px sans-serif';
  ctx.fillText('知识问答得分：'+score+' / '+QUIZ.length, W/2, 520);
  ctx.fillStyle='#cdd6ff'; ctx.font='18px sans-serif';
  ctx.fillText('"仰望星空，勇敢探索未知"', W/2, 580);
  const d=new Date();
  ctx.fillStyle='#7d8ad0'; ctx.font='16px sans-serif';
  ctx.fillText('发证日期 '+d.getFullYear()+'.'+(d.getMonth()+1)+'.'+d.getDate(), W/2, 640);
  ctx.fillStyle='#4fc3f7'; ctx.font='16px sans-serif';
  ctx.fillText('★ STAR VOYAGE ★', W/2, 680);
  document.getElementById('cardLayer').classList.add('show');
}
function downloadCard(){
  const c=document.getElementById('cardCanvas');
  const a=document.createElement('a');
  a.download='星际之旅纪念卡片.png';
  a.href=c.toDataURL('image/png');
  a.click();
  toast('卡片已保存到下载目录 💾');
}

let toastTimer;

  toastTimer=setTimeout(()=>t.classList.remove('show'),1800);

/* =================== 音频（Web Audio 合成，无需素材） =================== */
let actx=null, bgGain=null, bgOsc=[], musicOn=false;
function ensureCtx(){ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)(); }
// 短促按钮/反馈音
function blip(freq){
  try{
    ensureCtx();
    const o=actx.createOscillator(), g=actx.createGain();
    o.type='sine'; o.frequency.value=freq;
    g.gain.value=0.0001;
    o.connect(g); g.connect(actx.destination);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.12, actx.currentTime+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+0.18);
    o.stop(actx.currentTime+0.2);
  }catch(e){}
}
// 火箭轰鸣（噪声）
function rocketRoar(){
  try{
    ensureCtx();
    const bufferSize=actx.sampleRate*2;
    const buffer=actx.createBuffer(1,bufferSize,actx.sampleRate);
    const data=buffer.getChannelData(0);
    for(let i=0;i<bufferSize;i++) data[i]=(Math.random()*2-1)*Math.pow(1-i/bufferSize,1.5);
    const src=actx.createBufferSource(); src.buffer=buffer;
    const filter=actx.createBiquadFilter(); filter.type='lowpass'; filter.frequency.value=400;
    const g=actx.createGain(); g.gain.value=0.35;
    src.connect(filter); filter.connect(g); g.connect(actx.destination);
    src.start();
  }catch(e){}
}
// 背景氛围（柔和持续和弦）
function toggleMusic(){
  ensureCtx();
  if(actx.state==='suspended') actx.resume();
  musicOn=!musicOn;
  const btn=document.getElementById('musicBtn');
  if(musicOn){
    btn.style.background='rgba(79,195,247,.4)';
    bgGain=actx.createGain(); bgGain.gain.value=0.0001; bgGain.connect(actx.destination);
    bgGain.gain.exponentialRampToValueAtTime(0.06, actx.currentTime+1.5);
    [196,261.6,329.6].forEach(f=>{ // G大调柔和三和弦
      const o=actx.createOscillator(); o.type='sine'; o.frequency.value=f;
      o.connect(bgGain); o.start(); bgOsc.push(o);
    });
    toast('🎵 宇宙氛围音乐开');
  }else{
    btn.style.background='rgba(255,255,255,.06)';
    if(bgGain){ bgGain.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+0.6); }
    setTimeout(()=>{ bgOsc.forEach(o=>{try{o.stop();}catch(e){}}); bgOsc=[]; },800);
    toast('🔇 音乐已关闭');
  }
}
document.getElementById('musicBtn').onclick=toggleMusic;

/* 触摸/键盘左右切换增强 */
let tsx=0;
document.getElementById('phone').addEventListener('touchstart',e=>{tsx=e.touches[0].clientX;},{passive:true});
document.getElementById('phone').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tsx;
  // 时间轴页不拦截横向滑动（用于看时间轴），其他页支持滑动翻页
  if(cur===2) return;
  if(dx<-60) go(cur+1);
  else if(dx>60) go(cur-1);
});
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight') go(cur+1);
  if(e.key==='ArrowLeft') go(cur-1);
});
